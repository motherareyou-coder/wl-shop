<html>

<head>

  <title>支付成功</title>

  <script type='text/javascript'>

  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      background-color: #F5F5F5;
      font-family: "MiSans Latin";
    }

    .container {
      text-align: center;
      background-color: #ffffff;
      width: 100%;
      margin: 80px auto;
      padding: 80px 5vw;
      box-sizing: border-box;
    }

    .header {
      color: #ff6900;
      font-size: 24px;
      margin-bottom: 40px;
      padding-bottom: 40px;
      font-weight: 600;
      border-bottom: 1px solid #e0e0e0;
    }

    .message {
      color: #191919;
      font-size: 16px;
      margin: 0;
    }

    .link {
      margin-top: 20px;
    }

    .link a {
      color: #ff6900;
      text-decoration: none;
      font-weight: 600;
    }

    .link a:hover {
      text-decoration: underline;
    }

    @media screen and (max-width: 720px) {

      .header {
        font-size: 18px;
      }

      .container {
        max-width: 720px;
        padding: 40px 5vw;
        margin: 0;
      }

      .message {
        font-size: 14px;
      }
    }

    @media screen and (min-width: 721px)and (max-width:1024px) {
      .container {
        max-width: 720px;
      }

      .header {
        font-size: 20px;
      }
    }

    @media screen and (min-width: 1025px)and (max-width:1440px) {
      .container {
        max-width: 1024;
      }
    }

    @media screen and (min-width: 1441px)and (max-width:1920px) {
      .container {
        max-width: 1400px;
      }
    }

    @media screen and (min-width: 1921px) {
      .container {
        max-width: 1680px;
      }
    }
  </style>

</head>

<body>

  <div class='container'>

    <div class='header'>Payment success! </div>

    <p class='message'>Thank you for your payment! The page will be automatically redirected.</p>

    <div class='link'>

      <p class='message'>If there is no automatic redirection, please click the link below：<a href='www.baidu.com'>Go
          to
          details</a></p>

    </div>

  </div>

</body>

</html>
