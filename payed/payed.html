        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f5f5f5;
            font-family: 'MiSans Latin';
        }

        .container {
            text-align: center;
            background-color: #ffffff;
            width: 100%;
            margin: 16px auto;
            padding: 80px 5vw;
            box-sizing: border-box;
        }

        .header {
            color: #ff6900;
            font-size: 24px;
            margin-bottom: 40px;
            padding-bottom: 40px;
            font-weight: 600;
            border-bottom: 1px solid #e0e0e0;
        }

        .message {
            color: #191919;
            font-size: 16px;
            margin: 0;
        }

        .link {
            margin-top: 20px;
        }

        .link a {
            color: #ff6900;
            text-decoration: none;
            font-weight: 600;
        }

        .link a:hover {
            text-decoration: underline;
        }

        @media screen and (max-width: 720px) {
            .header {
                font-size: 18px;
            }

            .container {
                padding: 40px 5vw;
                margin-top: 8px;
            }

            .message {
                font-size: 14px;
            }
        }

        @media screen and (min-width: 721px) and (max-width: 1024px) {
            .header {
                font-size: 20px;
            }
        }

        .site-container {
            margin: 0 auto;
        }

        .site-header {
            background-color: #fff;
            box-shadow: 0 6px 16px 0 rgba(25, 25, 25, 0.06);
            top: 0;
            transition: 0.3s cubic-bezier(0.5, 0, 0, 0.75);
            z-index: 20;
            height: var(--header-height);
        }

        .site-header--sticky {
            position: sticky;
        }

        .site-header__navigation {
            align-items: center;
            box-sizing: border-box;
            display: flex;
            height: var(--header-height);
            justify-content: space-between;
            margin: 0 auto;
        }

        .navigation__group {
            display: flex;
            height: inherit;
            align-items: center;
        }

        .navigation__item {
            list-style: none;
        }

        .navigation__link {
            text-decoration: none;
            color: #191919;
            align-items: center;
            cursor: pointer;
            display: flex;
            font-size: 16px;
            height: 100%;
            padding: 0 8px;
            position: relative;
        }

        .micon {
            font-family: "micon" !important;
            font-size: 16px;
            font-style: normal;
            -webkit-font-smoothing: antialiased;
        }

        @media screen and (max-width: 720px) {
            .site-header {
                --header-height: 48px;
            }

            .site-container {
                max-width: 720px;
                padding: 0 4px;
            }

            .site-header .site-header__navigation .navigation__item {
                margin: 0 4px;
            }

            .shortcut__icon {
                font-size: 20px
            }
        }

        @media screen and (min-width: 721px) and (max-width: 1024px) {

                margin: 0 4px;
            }

                font-size: 20px
            }
