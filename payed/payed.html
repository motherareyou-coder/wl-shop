<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>支付成功</title>

  <script type="text/javascript">
    // setTimeout(function () { window.location.href = 'www.baidu.com'; }, 3500);
  </script>
  <link rel="stylesheet" href="./fonts/iconfont.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: #f5f5f5;
      font-family: 'MiSans Latin';
    }

    .container {
      text-align: center;
      background-color: #ffffff;
      width: 100%;
      margin: 16px auto;
      padding: 80px 5vw;
      box-sizing: border-box;
    }

    .header {
      color: #ff6900;
      font-size: 24px;
      margin-bottom: 40px;
      padding-bottom: 40px;
      font-weight: 600;
      border-bottom: 1px solid #e0e0e0;
    }

    .message {
      color: #191919;
      font-size: 16px;
      margin: 0;
    }

    .link {
      margin-top: 20px;
    }

    .link a {
      color: #ff6900;
      text-decoration: none;
      font-weight: 600;
    }

    .link a:hover {
      text-decoration: underline;
    }

    @media screen and (max-width: 720px) {
      .header {
        font-size: 18px;
      }

      .container {
        padding: 40px 5vw;
        margin-top: 8px;
      }

      .message {
        font-size: 14px;
      }
    }

    @media screen and (min-width: 721px) and (max-width: 1024px) {
      .header {
        font-size: 20px;
      }
    }

    .site-container {
      margin: 0 auto;
    }

    .site-header {
      background-color: #fff;
      box-shadow: 0 6px 16px 0 rgba(25, 25, 25, 0.06);
      top: 0;
      transition: 0.3s cubic-bezier(0.5, 0, 0, 0.75);
      z-index: 20;
      height: var(--header-height);
    }

    .site-header--sticky {
      position: sticky;
    }

    .site-header__navigation {
      align-items: center;
      box-sizing: border-box;
      display: flex;
      height: var(--header-height);
      justify-content: space-between;
      margin: 0 auto;
    }

    .navigation__group {
      display: flex;
      height: inherit;
      align-items: center;
    }

    .navigation__item {
      list-style: none;
    }

    .navigation__link {
      text-decoration: none;
      color: #191919;
      align-items: center;
      cursor: pointer;
      display: flex;
      font-size: 16px;
      height: 100%;
      padding: 0 8px;
      position: relative;
    }

    .micon {
      font-family: "micon" !important;
      font-size: 16px;
      font-style: normal;
      -webkit-font-smoothing: antialiased;
    }

    @media screen and (max-width: 720px) {
      .site-header {
        --header-height: 48px;
      }

      .site-container {
        max-width: 720px;
        padding: 0 4px;
      }

      .site-header .site-header__navigation .navigation__item {
        margin: 0 4px;
      }

      .shortcut__icon {
        font-size: 20px
      }
    }

    @media screen and (min-width: 721px) and (max-width: 1024px) {
      .site-header {
        --header-height: 48px;
      }

      .site-container {
        max-width: 1024px;
        padding: 0 20px;
      }

      .site-header .site-header__navigation .navigation__item {
        margin: 0 4px;
      }

      .shortcut__icon {
        font-size: 20px
      }
    }

    @media screen and (min-width: 1025px) and (max-width: 1440px) {
      .site-header {
        --header-height: 48px;
      }

      .site-container {
        max-width: 1440px;
        padding: 0 16px;
      }

      .site-header .site-header__navigation .navigation__item {
        margin: 0 8px;
      }

      .shortcut__icon {
        font-size: 20px
      }
    }

    @media screen and (min-width: 1441px) and (max-width: 1920px) {
      .site-header {
        --header-height: 56px;
      }

      .site-container {
        max-width: 1500px;
        padding: 0 8px;
      }

      .site-header .site-header__navigation .navigation__item {
        margin: 0 16px;
      }

      .shortcut__icon {
        font-size: 28px
      }
    }

    @media screen and (min-width: 1921px) {
      .site-header {
        --header-height: 56px;
      }

      .site-container {
        max-width: 1500px;
        padding: 0 8px;
      }

      .site-header .site-header__navigation .navigation__item {
        margin: 0 16px;
      }

      .shortcut__icon {
        font-size: 28px
      }
    }
  </style>
</head>

<body>
  <header class="site-header site-header--sticky">
    <nav class="site-container site-header__navigation">
      <div class="navigation__logo">
        <a href="" class="logo__link">
          <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true"
            role="img" ssr="true" class="svg-icon logo__mi iconify iconify--icon" style="font-size: 32px" width="1em"
            height="1em" viewBox="0 0 1024 1024">
            <path d="M512 512m-512 0a512 512 0 1 0 1024 0 512 512 0 1 0-1024 0Z" fill="#F78377" p-id="7904"></path>
            <path
              d="M684.8 578.56l-112.64-259.84c-15.36-37.12-58.88-53.76-98.56-39.68l-227.84 87.04c-39.68 15.36-58.88 56.32-46.08 94.72l90.88 267.52c6.4 19.2 21.76 37.12 38.4 44.8 19.2 8.96 39.68 10.24 57.6 3.84l258.56-99.84c17.92-6.4 32-21.76 39.68-42.24 7.68-16.64 7.68-38.4 0-56.32z"
              fill="#FFFFFF" opacity=".5" p-id="7905"></path>
            <path
              d="M828.16 659.2l-12.8-331.52c-1.28-47.36-42.24-84.48-90.88-84.48H437.76c-48.64 0-88.32 35.84-90.88 84.48l-12.8 330.24c-1.28 23.04 7.68 48.64 23.04 65.28 16.64 17.92 39.68 28.16 61.44 28.16h325.12c21.76 0 43.52-10.24 61.44-29.44 16.64-15.36 24.32-38.4 23.04-62.72z"
              fill="#FFFFFF" p-id="7906"></path>
            <path
              d="M581.12 492.8c-33.28 0-62.72-12.8-85.76-35.84-23.04-23.04-34.56-53.76-34.56-85.76 0-11.52 8.96-20.48 20.48-20.48 11.52 0 20.48 8.96 20.48 20.48 0 44.8 35.84 80.64 80.64 80.64s80.64-35.84 80.64-80.64c0-11.52 8.96-20.48 20.48-20.48s20.48 8.96 20.48 20.48c-1.28 66.56-56.32 121.6-122.88 121.6z"
              fill="#F78377" p-id="7907"></path>
          </svg>
        </a>
      </div>
      <ul class="navigation__group navigation__shortcut">
        <li class="navigation__item shortcut__item">
          <a href="" class="navigation__link">
            <i class="micon micon-shopping-cart shortcut__icon"></i>
          </a>
        </li>
        <li class="navigation__item shortcut__item">
          <a href="" class="navigation__link">
            <i class="micon micon-account shortcut__icon"></i>
          </a>
        </li>
      </ul>
    </nav>
  </header>
  <main>
    <div class="site-container">
      <div class="container">
        <div class="header">Payment success!</div>

        <p class="message">
          Thank you for your payment! The page will be automatically redirected.
        </p>

        <div class="link">
          <p class="message">
            If there is no automatic redirection, please click the link
            below：<a href="www.baidu.com">Go to details</a>
          </p>
        </div>
      </div>
    </div>
  </main>
</body>

</html>
